    document.addEventListener('DOMContentLoaded', function () {
        const container = document.getElementById('container');
        const DESIGN_WIDTH = 1216;
        const DESIGN_HEIGHT = 872;

        function scaleIfNeeded() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            // Масштабируем ТОЛЬКО если экран уже или ниже макета
            if (vw >= DESIGN_WIDTH && vh >= DESIGN_HEIGHT) {
                // Достаточно места — сбрасываем масштаб
                container.style.transform = '';
            } else {
                // Нужен масштаб
                const scaleX = vw / DESIGN_WIDTH;
                const scaleY = vh / DESIGN_HEIGHT;
                const scale = Math.min(scaleX, scaleY);

                const containerWidth = DESIGN_WIDTH * scale;

                if (containerWidth < vw) {
                    container.style['margin-left'] = (vw - containerWidth) / 2 + 'px';
                } else {
                    container.style['margin-left'] = 'auto';
                }


                container.style.transform = `scale(${scale})`;
            }
        }

        scaleIfNeeded();
        window.addEventListener('resize', scaleIfNeeded);
    });
	// Исправление высоты для Mac - добавьте в существующий скрипт
function setRealViewportHeight() {
    const vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
}

// Вызываем при загрузке и ресайзе
document.addEventListener('DOMContentLoaded', function() {
    setRealViewportHeight();
    window.addEventListener('resize', setRealViewportHeight);
    window.addEventListener('orientationchange', setRealViewportHeight);
    
    // Ваш существующий код
    const container = document.getElementById('container');
    const DESIGN_WIDTH = 1216;
    const DESIGN_HEIGHT = 872;

    function scaleIfNeeded() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        if (vw >= DESIGN_WIDTH && vh >= DESIGN_HEIGHT) {
            container.style.transform = '';
        } else {
            const scaleX = vw / DESIGN_WIDTH;
            const scaleY = vh / DESIGN_HEIGHT;
            const scale = Math.min(scaleX, scaleY);
            const containerWidth = DESIGN_WIDTH * scale;

            if (containerWidth < vw) {
                container.style['margin-left'] = (vw - containerWidth) / 2 + 'px';
            } else {
                container.style['margin-left'] = 'auto';
            }

            container.style.transform = `scale(${scale})`;
        }
    }

    scaleIfNeeded();
    window.addEventListener('resize', function() {
        setRealViewportHeight();
        scaleIfNeeded();
